name: Daily Report
on:
  schedule:
    - cron: '30 0 * * 1-5'
  workflow_dispatch:
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: pip install akshare pandas --quiet 2>/dev/null || true
      - name: Run analysis
        run: python3 daily_report.py
        env:
          PUSHPLUS_TOKEN: ${{ secrets.WX_PUSH_KEY }}

name: A鑲＄洏鍓嶅垎鏋?on:
  schedule:
    - cron: '30 0 * * 1-5'
  workflow_dispatch:
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 瀹夎渚濊禆
        run: pip install akshare pandas --quiet 2>/dev/null || true
      - name: 杩愯鐩樺墠鍒嗘瀽
        run: python3 daily_report.py
        env:
          PUSHPLUS_TOKEN: ${{ secrets.WX_PUSH_KEY }}
